version: 2
updates:
  # Keep npm deps patched (security + supply-chain hygiene). Grouped to reduce PR noise.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      production-deps:
        dependency-type: production
      dev-deps:
        dependency-type: development
  # Keep the GitHub Actions themselves patched.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
