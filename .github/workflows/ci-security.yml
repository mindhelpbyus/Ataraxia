name: CI & Security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check (must be clean)
        run: npm run typecheck
      - name: Production build
        run: npm run build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (block committed secrets/keys)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Fail the build on high/critical vulns (supply-chain hygiene).
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  codeql-sast:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
