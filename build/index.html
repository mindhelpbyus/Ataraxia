  <!-- Content Security Policy (HIPAA / Security Audit Requirement)
       Hardened: no script-src 'unsafe-inline' (all scripts are 'self' external modules),
       no external script CDNs. style-src keeps 'unsafe-inline' (React style={{}} attrs).
       Note: frame-ancestors is enforced via the X-Frame-Options header in amplify.yml
       (meta-CSP frame-ancestors is ignored by browsers). -->

    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: https: blob:;
    font-src 'self' data:;
    object-src 'none';
    connect-src 'self' https://*.execute-api.ap-south-1.amazonaws.com https://cognito-idp.ap-south-1.amazonaws.com https://*.auth.ap-south-1.amazoncognito.com wss://*.livekit.cloud https://*.livekit.cloud https://api.pwnedpasswords.com https://api.zippopotam.us https://api.postalpincode.in;
    base-uri 'self';
    form-action 'self';
  ">
